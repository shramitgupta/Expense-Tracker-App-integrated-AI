name: ai_expense_tracker
description: ExpenseIQ AI — Your AI Financial Assistant
publish_to: 'none'
version: 2.0.0+1

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_bloc: ^9.1.1
  bloc: ^9.0.0
  equatable: ^2.0.7

  # Local Storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # AI Integration
  google_generative_ai: ^0.4.6

  # Image Picker
  image_picker: ^1.1.2

  # Charts
  fl_chart: ^0.70.2

  # Dependency Injection
  get_it: ^8.0.3

  # Utilities
  intl: ^0.20.2
  uuid: ^4.5.1
  path_provider: ^2.1.5
  google_fonts: ^6.2.1

  # Animations
  flutter_animate: ^4.5.2

  # Sharing/Export
  share_plus: ^10.1.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
